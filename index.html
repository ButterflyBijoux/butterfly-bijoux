<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Butterfly Bijoux</title>

<style>
/* ===== BRAND COLOURS ===== */
:root {
  --pink: #f7c6d0;
  --black: #111111;
  --gold: #c9a24e;
  --white: #ffffff;
}

/* ===== GLOBAL ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  background: var(--white);
  color: var(--black);
}

/* ===== TOP BAR ===== */
.topbar {
  background: var(--black);
  color: var(--pink);
  text-align: center;
  padding: 8px;
  font-size: 12px;
  letter-spacing: 1px;
}

/* ===== HEADER ===== */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 25px;
  border-bottom: 1px solid #eee;
  position: sticky;
  top: 0;
  background: white;
  z-index: 1000;
}

.logo {
  font-size: 18px;
  font-weight: bold;
  color: var(--black);
}

.logo span {
  color: var(--gold);
}

nav a {
  margin: 0 10px;
  text-decoration: none;
  color: var(--black);
  font-size: 13px;
}

.icons {
  font-size: 16px;
}

/* ===== SLIDESHOW ===== */
.slideshow {
  width: 100%;
  height: 70vh;
  position: relative;
  overflow: hidden;
}

.slide {
  width: 100%;
  height: 70vh;
  position: absolute;
  opacity: 0;
  transition: 1s ease-in-out;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
  color: white;
  font-size: 32px;
  font-weight: bold;
}

.slide1 {
  background: linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.3)),
  url('https://images.unsplash.com/photo-1520975916090-3105956dac38') center/cover;
}

.slide2 {
  background: linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.3)),
  url('https://images.unsplash.com/photo-1514996937319-344454492b37') center/cover;
}

.slide3 {
  background: linear-gradient(rgba(0,0,0,0.3),rgba(0,0,0,0.3)),
  url('https://images.unsplash.com/photo-1520975682031-a8c9b1a0b9d2') center/cover;
}

.active {
  opacity: 1;
}

.shopbtn {
  margin-top: 15px;
  padding: 10px 20px;
  background: var(--gold);
  border: none;
  color: white;
  cursor: pointer;
}

/* ===== SECTIONS ===== */
.section {
  padding: 50px 20px;
  text-align: center;
}

.section h2 {
  margin-bottom: 20px;
}

/* ===== PRODUCTS ===== */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 20px;
  padding: 0 20px;
}

.product {
  border: 1px solid #eee;
  padding: 10px;
}

.product img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.price {
  color: var(--gold);
  font-weight: bold;
}

/* ===== FOOTER ===== */
footer {
  margin-top: 50px;
  background: var(--black);
  color: white;
  text-align: center;
  padding: 30px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="topbar">
FREE UK DELIVERY OVER £50 • NEW DROP EVERY WEEK
</div>

<header>
  <div class="logo">Butterfly <span>Bijoux</span></div>

  <nav>
    <a href="#">Home</a>
    <a href="#">New In</a>
    <a href="#">Dresses</a>
    <a href="#">Co-Ords</a>
    <a href="#">Shoes</a>
  </nav>

  <div class="icons">🛒 ❤️ 👤</div>
</header>

<!-- SLIDESHOW -->
<div class="slideshow">

  <div class="slide slide1 active">
    <div>
      Summer Dresses<br>
      <button class="shopbtn">Shop Now</button>
    </div>
  </div>

  <div class="slide slide2">
    <div>
      Elegant Co-Ords<br>
      <button class="shopbtn">Shop Now</button>
    </div>
  </div>

  <div class="slide slide3">
    <div>
      Holiday Sandals<br>
      <button class="shopbtn">Shop Now</button>
    </div>
  </div>

</div>

<!-- NEW IN -->
<div class="section">
  <h2>NEW IN</h2>

  <div class="products">

    <div class="product">
      <img src="https://images.unsplash.com/photo-1520975916090-3105956dac38">
      <p>White Co-Ord</p>
      <p class="price">£29.99</p>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1514996937319-344454492b37">
      <p>Floral Dress</p>
      <p class="price">£34.99</p>
    </div>

    <div class="product">
      <img src="https://images.unsplash.com/photo-1520975682031-a8c9b1a0b9d2">
      <p>Black Jumpsuit</p>
      <p class="price">£39.99</p>
    </div>

  </div>
</div>

<footer>
© 2026 Butterfly Bijoux • All Rights Reserved
</footer>

<!-- SLIDESHOW SCRIPT -->
<script>
let slides = document.querySelectorAll(".slide");
let index = 0;

setInterval(() => {
  slides[index].classList.remove("active");
  index = (index + 1) % slides.length;
  slides[index].classList.add("active");
}, 4000);
</script>

</body>
</html>
